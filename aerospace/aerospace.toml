# AeroSpace config — allenmyers
# Backup: ~/.config/wm-backup-20260405/aerospace/aerospace.toml

# ─── Startup ────────────────────────────────────────────────────────────────
after-login-command = []
after-startup-command = []
start-at-login = true

# ─── Focus follows mouse ────────────────────────────────────────────────────
# AeroSpace has no native focus-follows-mouse. Yabai runs alongside for this:
#   yabai -m config focus_follows_mouse autofocus
# See ~/.config/yabai/yabairc

# ─── Normalization ──────────────────────────────────────────────────────────
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# ─── Layout ─────────────────────────────────────────────────────────────────
# accordion-padding only matters when using accordion layout
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# ─── Mouse ──────────────────────────────────────────────────────────────────
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['move-mouse window-lazy-center']

# Unhide apps so cmd-h doesn't break the tiling tree
automatically-unhide-macos-hidden-apps = true

# ─── Keyboard ───────────────────────────────────────────────────────────────
[key-mapping]
preset = 'qwerty'

# ─── Gaps ───────────────────────────────────────────────────────────────────
# Minimal gaps — your style is one maximized window per workspace
[gaps]
inner.horizontal = 0
inner.vertical   = 0
outer.left       = 0
outer.bottom     = 0
outer.top        = 0
outer.right      = 0

# ─── Workspace → Monitor assignment ────────────────────────────────────────
# Main/external monitor (left)
#   A = aws console
#   B = aws console
#   D = aws console
#   F = firefox
#   P = postman
#   S = slack
#   T = terminal (Ghostty)
#   W = work browser
# Built-in monitor (right)
#   C = personal browser
#   M = meetings
#   O = other
#   V = vpn
[workspace-to-monitor-force-assignment]
A = 'main'
B = 'main'
C = 'built-in'
D = 'main'
F = 'main'
M = 'built-in'
O = 'built-in'
P = 'main'
S = 'main'
T = 'main'
V = 'built-in'
W = 'main'

# ─── Auto-assign apps to workspaces ────────────────────────────────────────
[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace S'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace T'

[[on-window-detected]]
if.app-id = 'com.postmanlabs.mac'
run = 'move-node-to-workspace P'

[[on-window-detected]]
if.app-id = 'com.amazonaws.acvc.osx'
run = 'move-node-to-workspace V'

[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = 'move-node-to-workspace F'

# Chrome windows go to different workspaces based on profile, but AeroSpace
# can't distinguish profiles. You'll need to manually move Chrome windows
# to the right workspace (alt-shift-<key>) after opening them.
# The first Chrome window will land here by default:
[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace W'

# ─── Main keybindings ──────────────────────────────────────────────────────
[mode.main.binding]

# --- Layout ---
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# --- Focus (move focus between tiled windows) ---
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# --- Move window within workspace ---
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

alt-cmd-h = ['join-with left', 'mode main']
alt-cmd-j = ['join-with down', 'mode main']
alt-cmd-k = ['join-with up', 'mode main']
alt-cmd-l = ['join-with right', 'mode main']

# --- Resize ---
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# --- Fullscreen ---
alt-cmd-f = 'fullscreen'

# --- Equal screen sizes ---
alt-cmd-equal = 'balance-sizes'

# -- screen capture (screenshot) ---
alt-cmd-s = 'exec-and-forget screencapture -i -c'

# --- Switch to workspace (caps+key → alt+key) ---
# Uses focus-workspace.sh to work around macOS focusing the wrong Chrome window
alt-a = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh A'
alt-b = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh B'
alt-c = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh C'
alt-d = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh D'
alt-e = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh E'
alt-f = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh F'
alt-g = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh G'
alt-i = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh I'
alt-m = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh M'
alt-n = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh N'
alt-o = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh O'
alt-p = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh P'
alt-q = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh Q'
alt-r = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh R'
alt-s = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh S'
alt-t = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh T'
alt-u = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh U'
alt-v = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh V'
alt-w = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh W'
alt-x = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh X'
alt-y = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh Y'
alt-z = 'exec-and-forget ~/.config/aerospace/focus-workspace.sh Z'

# --- Move window to workspace (caps+shift+key → alt+shift+key) ---
alt-shift-a = 'move-node-to-workspace A'
alt-shift-b = 'move-node-to-workspace B'
alt-shift-c = 'move-node-to-workspace C'
alt-shift-d = 'move-node-to-workspace D'
alt-shift-e = 'move-node-to-workspace E'
alt-shift-f = 'move-node-to-workspace F'
alt-shift-g = 'move-node-to-workspace G'
alt-shift-i = 'move-node-to-workspace I'
alt-shift-m = 'move-node-to-workspace M'
alt-shift-n = 'move-node-to-workspace N'
alt-shift-o = 'move-node-to-workspace O'
alt-shift-p = 'move-node-to-workspace P'
alt-shift-q = 'move-node-to-workspace Q'
alt-shift-r = 'move-node-to-workspace R'
alt-shift-s = 'move-node-to-workspace S'
alt-shift-t = 'move-node-to-workspace T'
alt-shift-u = 'move-node-to-workspace U'
alt-shift-v = 'move-node-to-workspace V'
alt-shift-w = 'move-node-to-workspace W'
alt-shift-x = 'move-node-to-workspace X'
alt-shift-y = 'move-node-to-workspace Y'
alt-shift-z = 'move-node-to-workspace Z'

# --- Quick switch ---
alt-tab = 'workspace-back-and-forth'

# --- Move workspace to other monitor ---
alt-ctrl-tab = 'move-workspace-to-monitor --wrap-around next'

# --- Focus monitor (ctrl-cmd-[/]) ---
ctrl-cmd-leftSquareBracket  = 'focus-monitor --wrap-around prev'
ctrl-cmd-rightSquareBracket = 'focus-monitor --wrap-around next'

# --- Move window to other monitor ---
ctrl-cmd-shift-leftSquareBracket  = 'move-node-to-monitor --wrap-around prev'
ctrl-cmd-shift-rightSquareBracket = 'move-node-to-monitor --wrap-around next'

# --- Cheatsheet (native transparent popup, dismiss with esc/q) ---
alt-shift-slash = 'exec-and-forget python3 ~/.config/aerospace/gen-cheatsheet.py && ~/.config/aerospace/cheatsheet'

# --- Service mode ---
alt-ctrl-semicolon = 'mode service'

# ─── Service mode ──────────────────────────────────────────────────────────
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']           # reset layout
f = ['layout floating tiling', 'mode main']            # toggle float
backspace = ['close-all-windows-but-current', 'mode main']

down = 'volume down'
up = 'volume up'
shift-down = ['volume set 0', 'mode main']
