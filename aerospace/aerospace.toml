# --- Service mode ---
alt-ctrl-semicolon = 'mode service'

# ─── Float rules ───────────────────────────────────────────────────────────
# TextEdit (used for cheatsheet) should float, not tile
[[on-window-detected]]
if.app-id = 'com.apple.TextEdit'
run = 'layout floating'

# ─── Service mode ──────────────────────────────────────────────────────────
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']           # reset layout
f = ['layout floating tiling', 'mode main']            # toggle float
backspace = ['close-all-windows-but-current', 'mode main']
shift-f = ['move-node-to-workspace F', 'mode main']   # move to Firefox workspace

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

down = 'volume down'
up = 'volume up'
shift-down = ['volume set 0', 'mode main']
